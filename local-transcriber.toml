[audio]
audio_source = "both"
mic_boost = 1.2
sample_rate = 16000

[streaming]
model_size = "medium"
language = "auto"
backend = "mlx-whisper"
chunk_duration = 30
vad_enabled = false
summary_model = "gemini"

[speaker]
mode = "pyannote"
threshold = 0.3

[vad]
min_silence_ms = 500
threshold = 0.3

[whisper]
condition_on_previous_text = false
no_speech_threshold = 0.6
compression_ratio_threshold = 2.4
logprob_threshold = -1
